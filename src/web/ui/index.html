<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiport Proxy - 配置管理</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Multiport Proxy</h1>
      <p class="subtitle">多端口代理配置管理</p>
    </header>

    <main>
      <div class="layout">
        <!-- 左侧：配置面板 -->
        <section class="panel config-panel">
          <div class="panel-header">
            <h2>代理规则</h2>
            <button class="btn btn-primary" onclick="showAddRuleForm()">+ 新增规则</button>
          </div>

          <div class="rules-list" id="rulesList">
            <div class="loading">加载中...</div>
          </div>
        </section>

        <!-- 右侧：日志面板 -->
        <section class="panel log-panel">
          <div class="panel-header">
            <h2>实时日志 <span class="log-limit-label">最近 200 条</span></h2>
            <div class="log-controls">
              <input type="text" id="logFilter" placeholder="筛选日志..." class="filter-input">
              <button class="btn btn-small" onclick="clearLogs()">清空</button>
            </div>
          </div>

          <div class="stats" id="stats">
            <div class="stat-item">
              <span class="label">总请求数：</span>
              <span class="value" id="totalLogs">0</span>
            </div>
            <div class="stat-item">
              <span class="label">错误数：</span>
              <span class="value" id="errorCount">0</span>
            </div>
            <div class="stat-item">
              <span class="label">平均耗时：</span>
              <span class="value" id="avgDuration">0ms</span>
            </div>
          </div>

          <div class="logs-container" id="logsContainer">
            <div class="log-entry">
              <p style="text-align: center; color: #999;">暂无日志</p>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <!-- 新增/编辑规则 Modal -->
  <div id="ruleModal" class="modal">
    <div class="modal-content modal-large">
      <div class="modal-header">
        <h3 id="modalTitle">新增代理规则</h3>
        <button class="close-btn" onclick="closeRuleForm()">&times;</button>
      </div>

      <form id="ruleForm" onsubmit="saveRule(event)">
        <div class="form-section">
          <h4>基础配置</h4>
          
          <div class="form-row">
            <div class="form-group">
              <label for="rulePort">本地监听端口 *</label>
              <input type="number" id="rulePort" min="1" max="65535" required placeholder="3000">
              <span class="form-hint" id="portHint" style="display: none;"></span>
            </div>

            <div class="form-group">
              <label for="ruleTarget">默认目标地址 *</label>
              <input type="url" id="ruleTarget" required placeholder="http://localhost:8000">
              <span class="form-hint">未匹配子规则时的兜底地址</span>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="ruleTimeout">超时时间 (ms)</label>
              <input type="number" id="ruleTimeout" min="1000" value="30000" placeholder="30000">
            </div>

            <div class="form-group">
              <label for="ruleRetries">重试次数</label>
              <input type="number" id="ruleRetries" min="0" value="0" placeholder="0">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="checkbox">
                <input type="checkbox" id="ruleCorsEnabled">
                启用 CORS
              </label>
            </div>

            <div class="form-group" id="corsOrigins" style="display: none;">
              <label for="ruleCorsOrigins">CORS 来源 (逗号分隔)</label>
              <input type="text" id="ruleCorsOrigins" value="*" placeholder="* 或 http://localhost:3000">
            </div>
          </div>

          <div class="form-group">
            <label class="checkbox">
              <input type="checkbox" id="ruleEnabled" checked>
              启用此规则
            </label>
          </div>
        </div>

        <div class="form-section">
          <div class="section-header">
            <h4>子规则</h4>
            <button type="button" class="btn btn-small btn-secondary" onclick="addSubRule()">+ 添加子规则</button>
          </div>
          <p class="form-hint">子规则按顺序匹配，优先级高于默认目标地址</p>
          
          <div id="subRulesList"></div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">保存</button>
          <button type="button" class="btn btn-secondary" onclick="closeRuleForm()">取消</button>
          <button type="button" class="btn btn-danger" id="deleteBtn" style="display: none;" onclick="deleteRule()">删除</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 操作确认层 -->
  <div id="confirmModal" class="confirm-modal" aria-hidden="true">
    <div class="confirm-dialog" role="alertdialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmMessage">
      <div class="confirm-mark" aria-hidden="true">!</div>
      <div class="confirm-copy">
        <p class="confirm-eyebrow">请确认操作</p>
        <h3 id="confirmTitle">确认继续？</h3>
        <p id="confirmMessage"></p>
      </div>
      <div class="confirm-actions">
        <button type="button" class="btn btn-secondary" id="confirmCancelBtn">取消</button>
        <button type="button" class="btn btn-danger" id="confirmActionBtn">确认</button>
      </div>
    </div>
  </div>

  <!-- 非阻塞式消息提示 -->
  <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="false"></div>

  <script src="/app.js"></script>
</body>
</html>
